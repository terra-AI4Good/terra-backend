services:
  terra-backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=sqlite+aiosqlite:///data/terra.db
    volumes:
      # Persist database and KB data across restarts
      - terra-data:/app/data
    restart: unless-stopped

volumes:
  terra-data:
